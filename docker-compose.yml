services:
  db:
    image: postgres:15-alpine
    container_name: erp_ventas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erp_ventas_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-erp_ventas_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: erp_ventas_web
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      SECRET_KEY: ${DOCKER_SECRET_KEY:-django-insecure-dev-docker-change-me}
      DEBUG: ${DOCKER_DEBUG:-True}
      ALLOWED_HOSTS: ${DOCKER_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${POSTGRES_DB:-erp_ventas_db}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_WAIT_TIMEOUT: ${DB_WAIT_TIMEOUT:-180}
      CSRF_TRUSTED_ORIGINS: ${DOCKER_CSRF_TRUSTED_ORIGINS:-}
      SECURE_PROXY_SSL_HEADER: ${SECURE_PROXY_SSL_HEADER:-True}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-False}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-False}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
      SECURE_HSTS_INCLUDE_SUBDOMAINS: ${SECURE_HSTS_INCLUDE_SUBDOMAINS:-False}
      SECURE_HSTS_PRELOAD: ${SECURE_HSTS_PRELOAD:-False}
      RUN_COLLECTSTATIC: ${RUN_COLLECTSTATIC:-True}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-True}
      RUN_SEED: ${RUN_SEED:-True}
      SEED_ONLY_IF_EMPTY: ${SEED_ONLY_IF_EMPTY:-True}
      SEED_CLIENTS: ${SEED_CLIENTS:-20}
      SEED_PRODUCTS: ${SEED_PRODUCTS:-30}
      SEED_ORDERS: ${SEED_ORDERS:-20}
      SEED_SALES: ${SEED_SALES:-10}
      SEED_CLAIMS: ${SEED_CLAIMS:-10}
      EMAIL_BACKEND: ${DOCKER_EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
