{% extends 'base.html' %}
{% block title %}Anular Venta | ERP Ventas{% endblock %}
{% block content %}
<div class="panel-card p-4 text-center">
    <h3 class="mb-3">Anular venta</h3>
    <p class="text-secondary">¿Deseas anular la venta #{{ object.id }}? El registro contable se conservará.</p>
    <form method="post">{% csrf_token %}
        <a class="btn btn-outline-secondary" href="{% url 'ventas:venta_list' %}">Volver</a>
        <button class="btn btn-danger">Anular venta</button>
    </form>
</div>
{% endblock %}
