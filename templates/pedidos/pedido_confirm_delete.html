{% extends 'base.html' %}
{% block title %}Cancelar Pedido | ERP Ventas{% endblock %}
{% block content %}
<div class="panel-card p-4 text-center">
    <h3 class="mb-3">Cancelar pedido</h3>
    <p class="text-secondary">¿Deseas cancelar el pedido #{{ object.id }}? El registro se conservará para auditoría.</p>
    <form method="post">{% csrf_token %}
        <a class="btn btn-outline-secondary" href="{% url 'pedidos:pedido_list' %}">Volver</a>
        <button class="btn btn-danger">Cancelar pedido</button>
    </form>
</div>
{% endblock %}
