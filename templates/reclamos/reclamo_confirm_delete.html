{% extends 'base.html' %}
{% block title %}Eliminar Reclamo | ERP Ventas{% endblock %}
{% block content %}
<div class="panel-card p-4 text-center">
    <h3 class="mb-3">Eliminar reclamo</h3>
    <p class="text-secondary">¿Deseas eliminar el reclamo #{{ object.id }}?</p>
    <form method="post">{% csrf_token %}
        <a class="btn btn-outline-secondary" href="{% url 'reclamos:reclamo_list' %}">Cancelar</a>
        <button class="btn btn-danger">Eliminar</button>
    </form>
</div>
{% endblock %}
